<text x='720' y='34' text-anchor='middle' font-size='24' fill='#222222' font-weight='bold' font-family='Helvetica, Arial, sans-serif'>BasicModel Space Hierarchy</text>
<rect x='620' y='64' width='200' height='48' fill='#d6eaf8' fill-opacity='1.0' rx='10' stroke='#2980b9' stroke-width='2'/>
<text x='720' y='95' text-anchor='middle' font-size='16' fill='#2c3e50' font-weight='bold'>InputSpace (IS)</text>
<rect x='620' y='718' width='200' height='48' fill='#fdebd0' fill-opacity='1.0' rx='10' stroke='#ca6f1e' stroke-width='2'/>
<text x='720' y='749' text-anchor='middle' font-size='16' fill='#ca6f1e' font-weight='bold'>OutputSpace (OS)</text>
<rect x='40' y='150' width='1360' height='285' fill='#eef6fb' fill-opacity='1.0' rx='14' stroke='#2980b9' stroke-width='2'/>
<text x='720' y='180' text-anchor='middle' font-size='18' fill='#2c3e50' font-weight='bold'>Perceptual Spaces</text>
<rect x='80' y='200' width='330' height='210' fill='#d6eaf8' fill-opacity='1.0' rx='10' stroke='#2980b9' stroke-width='1.8'/>
<text x='102' y='234' text-anchor='start' font-size='24' fill='#2980b9' font-weight='bold'>PS</text>
<text x='152' y='234' text-anchor='start' font-size='16' fill='#2c3e50' font-weight='bold'>Part Space</text>
<text x='98' y='272' text-anchor='start' font-size='11.4' fill='#2c3e50'>• synthesizes atoms into part-percepts</text>
<text x='98' y='294' text-anchor='start' font-size='11.4' fill='#2c3e50'>• atom-view stem from InputSpace</text>
<text x='98' y='316' text-anchor='start' font-size='11.4' fill='#2c3e50'>• Sigma synthesis fold</text>
<text x='98' y='338' text-anchor='start' font-size='11.4' fill='#2c3e50'>• MPHF + index table</text>
<text x='98' y='360' text-anchor='start' font-size='11.4' fill='#2c3e50'>• Lexicon: surface rows</text>
<text x='98' y='382' text-anchor='start' font-size='11.4' fill='#2c3e50'>• part codebook: part-percepts</text>
<rect x='555' y='200' width='330' height='210' fill='#d5f5e3' fill-opacity='1.0' rx='10' stroke='#27ae60' stroke-width='1.8'/>
<text x='577' y='234' text-anchor='start' font-size='24' fill='#27ae60' font-weight='bold'>WS</text>
<text x='627' y='234' text-anchor='start' font-size='16' fill='#2c3e50' font-weight='bold'>Whole Space</text>
<text x='573' y='272' text-anchor='start' font-size='11.4' fill='#2c3e50'>• analyzes properties, regions and wholes</text>
<text x='573' y='294' text-anchor='start' font-size='11.4' fill='#2c3e50'>• unity / property view</text>
<text x='573' y='316' text-anchor='start' font-size='11.4' fill='#2c3e50'>• Pi analysis fold</text>
<text x='573' y='338' text-anchor='start' font-size='11.4' fill='#2c3e50'>• property basis: regions</text>
<text x='573' y='360' text-anchor='start' font-size='11.4' fill='#2c3e50'>• whole-percept codebook</text>
<text x='573' y='382' text-anchor='start' font-size='11.4' fill='#2c3e50'>• paired orth / semantic rows</text>
<rect x='1030' y='200' width='330' height='210' fill='#fdebd0' fill-opacity='1.0' rx='10' stroke='#ca6f1e' stroke-width='1.8'/>
<text x='1052' y='234' text-anchor='start' font-size='24' fill='#ca6f1e' font-weight='bold'>SS</text>
<text x='1102' y='234' text-anchor='start' font-size='16' fill='#2c3e50' font-weight='bold'>Symbolic Space</text>
<text x='1048' y='272' text-anchor='start' font-size='11.4' fill='#2c3e50'>• zero-dimensional references</text>
<text x='1048' y='294' text-anchor='start' font-size='11.4' fill='#2c3e50'>• symbol codebook</text>
<text x='1048' y='316' text-anchor='start' font-size='11.4' fill='#2c3e50'>• grammar / signal router</text>
<text x='1048' y='338' text-anchor='start' font-size='11.4' fill='#2c3e50'>• operators live in codebook</text>
<text x='1048' y='360' text-anchor='start' font-size='11.4' fill='#2c3e50'>• TruthLayer stores DoT propositions</text>
<text x='1048' y='382' text-anchor='start' font-size='11.4' fill='#2c3e50'>• TruthLayer: record / query / field</text>
<rect x='190' y='485' width='1060' height='176' fill='#f5eef8' fill-opacity='1.0' rx='14' stroke='#8e44ad' stroke-width='2'/>
<text x='214' y='519' text-anchor='start' font-size='18' fill='#8e44ad' font-weight='bold'>Conceptual Space (CS)</text>
<text x='214' y='551' text-anchor='start' font-size='11.4' fill='#2c3e50'>• STM plus concept relations</text>
<text x='214' y='571' text-anchor='start' font-size='11.4' fill='#2c3e50'>• ties part-percepts to whole-percepts</text>
<text x='214' y='591' text-anchor='start' font-size='11.4' fill='#2c3e50'>• Concept codebook: relation rows</text>
<text x='214' y='611' text-anchor='start' font-size='11.4' fill='#2c3e50'>• AttentionLayer: symbolic wave over concept inventory</text>
<text x='214' y='631' text-anchor='start' font-size='11.4' fill='#2c3e50'>• ConceptAllocator: ids, ordered records, relation pool</text>
<text x='214' y='651' text-anchor='start' font-size='11.4' fill='#2c3e50'>• Truth-gated acceptance and reasoning hooks</text>
