# Sentence-level grammar for WikiOracle
#
# Groups lexed words into sentences. A sentence is a sequence of
# words (separated by spaces) followed by a sentence separator (. ! ? ;).
# Deep syntactic structure (NP, VP, etc.) is handled by grammar.cfg
# and is not in scope here.
#
# Terminals:
#   WORD      — any content word or non-letter run (from Lex)
#   SPACE     — intra-sentence whitespace between words (from Lex)
#   SEPARATOR — sentence-ending punctuation (. ! ?)

S -> SENT
S -> S SENT

SENT -> WORDS SEPARATOR

WORDS -> WORD
WORDS -> WORDS SPACE WORD

WORD -> "WORD"
SPACE -> "SPACE"
SEPARATOR -> "SEPARATOR"
