# Sentence-level grammar for WikiOracle
#
# Groups lexed words into sentences. A sentence is a sequence of
# words followed by a sentence separator (. ! ? ;).
# Deep syntactic structure (NP, VP, etc.) is handled by grammar.cfg
# and is not in scope here.
#
# Terminals:
#   WORD      — any content word (from Lex)
#   SEPARATOR — sentence-ending punctuation (. ! ?)

S -> SENT
S -> S SENT

SENT -> WORDS SEPARATOR

WORDS -> WORD
WORDS -> WORDS WORD

WORD -> "WORD"
SEPARATOR -> "SEPARATOR"
