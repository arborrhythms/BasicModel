# Word-level grammar for WikiOracle
#
# Flat tokenization: returns non-space and space tokens in sequence.
# Like split() except whitespace tokens are also returned.
# No sentence grouping or syntactic structure.
#
# Terminals:
#   WORD      — any content word or non-letter run (from Lex)
#   SPACE     — whitespace between words (from Lex)

S -> TOKEN
S -> S TOKEN

TOKEN -> WORD
TOKEN -> SPACE

WORD -> "WORD"
SPACE -> "SPACE"
